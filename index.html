<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowe Code - VR/AR Immersive Research IDE | WebXR Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans&family=IBM+Plex+Serif&family=JetBrains+Mono&family=Space+Grotesk:wght@400;600;700&display=swap">
    <link href="/src/main.css" rel="stylesheet" />
    <script>
        (function() {
            'use strict';
            if (typeof window === 'undefined') return;
            
            const startTime = Date.now();
            
            if (!window.performance) {
                window.performance = {};
            }
            
            if (!window.performance.now) {
                window.performance.now = function() { 
                    return Date.now() - startTime; 
                };
            }
            
            if (!window.performance.timing) {
                window.performance.timing = { 
                    navigationStart: startTime 
                };
            }
            
            if (!window.performance.navigation) {
                window.performance.navigation = { 
                    type: 0 
                };
            }
            
            if (!window.performance.timeOrigin) {
                window.performance.timeOrigin = startTime;
            }
            
            if (!window.requestAnimationFrame) {
                let lastTime = 0;
                window.requestAnimationFrame = function(callback) {
                    const currentTime = Date.now();
                    const timeToCall = Math.max(0, 16 - (currentTime - lastTime));
                    const id = window.setTimeout(function() {
                        callback(currentTime + timeToCall);
                    }, timeToCall);
                    lastTime = currentTime + timeToCall;
                    return id;
                };
            }
            
            if (!window.cancelAnimationFrame) {
                window.cancelAnimationFrame = function(id) {
                    clearTimeout(id);
                };
            }

            if (!window.ResizeObserver) {
                window.ResizeObserver = class ResizeObserver {
                    observe() {}
                    unobserve() {}
                    disconnect() {}
                };
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script src="/env.js"></script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
